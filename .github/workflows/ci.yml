name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Compile source tree
        run: python -m compileall src

      - name: Run walk-forward policy suite
        run: python scripts/validate_walkforward_policy_suite.py

      - name: Validate regime benchmark gate artifacts
        run: python scripts/validate_regime_benchmark_gate.py --summary-json scripts/regime_benchmark_summary_fixture.json
